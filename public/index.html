<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BSFDS Workload Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: auto; }
    body { background: #0f1117; min-width: 900px; }
    .btn {
      background: #1e2335;
      border: 1px solid #2a3050;
      color: #9aa3c2;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: #4f8ef7; color: #4f8ef7; }
    select option { background: #1e2335; }
    @media print {
      body { background: #fff; color: #000; }
      .btn, button { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
